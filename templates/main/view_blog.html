{% extends 'main/base.html' %}
{% load static %}
{% block content %}
  <style>
    /* CKEditor content styling */
    .ck-content h1 {
      font-size: 2rem;
      font-weight: bold;
    }
    .ck-content h2 {
      font-size: 1.6rem;
      font-weight: bold;
    }
    .ck-content h3 {
      font-size: 1.3rem;
      font-weight: bold;
    }
    .ck-content p {
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .ck-content ul,
    .ck-content ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }
    .ck-content blockquote {
      border-left: 3px solid #ccc;
      padding-left: 10px;
      color: #666;
    }
    .ck-content table {
      border-collapse: collapse;
      width: 100%;
    }
    .ck-content table td,
    .ck-content table th {
      border: 1px solid #ddd;
      padding: 8px;
    }
  </style>
  <section class="min-h-screen lg:min-h-[100vh] flex items-end relative overflow-hidden">
    <!-- Background Video -->
    <div class="absolute inset-0 z-0 overflow-hidden">
      <video class="w-full h-full object-cover object-center" autoplay muted loop playsinline preload="auto" poster="https://your-cdn.com/hero-poster.webp">
        <source src="{% static 'videos/blog.mp4' %}" type="video/webm" />
        <source src="{% static 'videos/blog.mp4' %}" type="video/mp4" />
      </video>

      <!-- Gradient Overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-charcoal via-charcoal/60 to-transparent"></div>
    </div>

    <!-- Sakthi Property at Top - Fixed position immediately when scrolling starts -->
    <div id="topBrand" class="text-base md:text-lg font-medium tracking-widest uppercase transition-all duration-300 absolute top-4 left-0 right-0 z-30 flex justify-center opacity-100">
      <a href="{% url 'index' %}" class="flex justify-center"><img class="w-30 h-10" id="logo2" src="{% static 'images/logo_home.webp' %}" alt="Sakthi Property Logo" /></a>
    </div>

    <div class="container mx-auto px-6 pb-24 md:pb-32 lg:pb-40 relative z-10">
      <div class="flex flex-col items-center text-center max-w-4xl mx-auto">
        <h1 id="typingText" class="font-display text-2xl md:text-4xl lg:text-5xl uppercase tracking-[0.20em] font-light text-ivory mb-6 whitespace-nowrap overflow-hidden"></h1>

        <!-- Cursor -->
        <span id="cursor" class="text-ivory animate-pulse"></span>
      </div>
    </div>

    <!-- Bottom Nav - Stays at bottom of hero section, always visible -->
    <div class="absolute bottom-0 left-0 right-0 z-20 flex justify-between items-center px-4 md:px-8 py-4 text-xs tracking-widest uppercase bg-transparent backdrop-blur-sm">
      <!-- Left side - Hidden on mobile, shown on desktop -->
      <div class="hidden md:flex gap-4 lg:gap-6 items-center text-ivory/80">
        <a href="{% url 'index' %}" class="hover:text-soft-gold transition-colors duration-300 hidden lg:inline">Home</a>
        <a href="{% url 'about' %}" class="hover:text-soft-gold transition-colors duration-300 hidden md:inline">Who we are</a>
        <a href="{% url 'properties' %}" class="hover:text-soft-gold transition-colors duration-300 hidden lg:inline">Properties</a>
        <a href="{% url 'services' %}" class="hover:text-soft-gold transition-colors duration-300 hidden md:inline">Services</a>
        <a href="{% url 'blogs' %}" class="hover:text-soft-gold transition-colors duration-300 hidden md:inline">Blog</a>
      </div>

      <!-- Hamburger Icon for Bottom Nav on Mobile -->
      <button onclick="toggleMobileMenu()" class="md:hidden flex items-center justify-center text-ivory" aria-label="Open menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Center - Empty space -->
      <div class="text-lg font-medium invisible">Sakthi Property</div>

      <!-- Right side - Hidden on mobile, shown on desktop -->
      <div class="hidden md:flex gap-4 lg:gap-6 text-ivory/80">
        <a href="{% url 'new_development' %}" class="hover:text-soft-gold transition-colors duration-300 hidden md:inline">New Development</a>
        <a href="{% url 'contact_us' %}" class="hover:text-soft-gold transition-colors duration-300 hidden lg:inline">Contact Us</a>
      </div>
      <!-- Search Icon for Bottom Nav on Mobile -->
      <button class="md:hidden flex items-center justify-center text-ivory" aria-label="Search">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>
    </div>
  </section>

  <section id="service-details" class="py-12">
    <div class="flex justify-end mb-6">
      <a href="{% url 'blogs' %}" class="flex items-center gap-2 border border-gray-300 rounded-full px-4 py-2 text-sm hover:bg-gray-900 hover:text-white transition">
        Back to Blogs
        <span class="w-6 h-6 rounded-full bg-green-800 text-white flex items-center justify-center">↩</span>
      </a>
    </div>
    <div class="max-w-4xl mx-auto px-4">
      <h3 class="text-2xl font-bold mb-6">{{ blog.title }}</h3>

      <!-- Center Image -->
      <div class="flex justify-center mb-8">
        <img src="{{ blog.image.url }}" alt="" class="rounded-xl max-w-full h-auto" />
      </div>

      <!-- Blog Content (CKEditor) -->
      <div class="ck-content prose max-w-none">{{ blog.content|safe }}</div>
    </div>
  </section>
{% endblock %}
