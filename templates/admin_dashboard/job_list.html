{% extends 'admin_dashboard/base.html' %}
{% block content %}
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center py-4">
    <div class="d-block mb-4 mb-md-0">
      <nav aria-label="breadcrumb" class="d-none d-md-inline-block">
        
      </nav>
      <h2 class="h4">Job's List</h2>
    </div>
    <div class="btn-toolbar mb-2 mb-md-0">
      <a href="{% url 'create_job' %}" class="btn btn-sm btn-gray-800 d-inline-flex align-items-center">
        <svg class="icon icon-xs me-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
        </svg>Add New
      </a>
    </div>
  </div>
  <div class="card card-body border-0 shadow table-wrapper table-responsive">
    <table id="myTable" class="table table-hover">
      <thead class="thead-light">
        <tr>
          <th>No.</th>
          <th>Title</th>
          <th>Job Type</th>
          <th>Location</th>

          <th>status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for data in job_data %}
          <tr>
            <td>{{ forloop.counter }}</td>
            <td>
              <span class="text-truncate d-inline-block" style="max-width: 150px;" title="{{ data.title }}">{{ data.title }}</span>
            </td>
            <td>{{ data.job_type }}</td>
            <td>{{ data.location }}</td>
            <td>{{ data.status }}</td>
            <td>
              
              <a class="btn btn-pill btn-outline-primary" href="{% url 'edit_job' data.id %}"><i class="bi bi-pencil-square"></i></a>&nbsp;
              <a class="btn btn-pill btn-outline-danger delete-btn" href="#" data-url="{% url 'delete_job' data.id %}"><i class="bi bi-trash"></i></a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <br />
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const deleteButtons = document.querySelectorAll('.delete-btn')
    
      deleteButtons.forEach((button) => {
        button.addEventListener('click', function (e) {
          e.preventDefault() // Prevent default navigation
          const url = this.getAttribute('data-url')
    
          Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Yes, delete it!'
          }).then((result) => {
            if (result.isConfirmed) {
              window.location.href = url
            }
          })
        })
      })
    })
  </script>
{% endblock %}
