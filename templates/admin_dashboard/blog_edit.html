{% extends 'admin_dashboard/base.html' %}

{% block content %}
  <style>
    /* Fix Choices.js to look like Bootstrap form-control */
    .choices__inner {
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      min-height: 38px;
      background-color: #fff;
      font-size: 1rem;
      line-height: 1.5;
    }
    
    .choices__list--multiple .choices__item {
      background-color: #0d6efd;
      color: #fff;
      border-radius: 0.2rem;
      padding: 0.25rem 0.5rem;
      margin-right: 0.25rem;
      font-size: 0.875rem;
    }
    
    .choices__input {
      font-size: 1rem;
      padding: 0.25rem;
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

  <div class="py-2">
    <nav aria-label="breadcrumb" class="d-none d-md-inline-block">
      <ol class="breadcrumb breadcrumb-dark breadcrumb-transparent">
        <li class="breadcrumb-item">
          <a href="/">
            <svg class="icon icon-xxs" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
          </a>
        </li>
        <li class="breadcrumb-item">
          <a href="{% url 'dashboard' %}">Dashboard</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">Edit Blog Post</li>
      </ol>
    </nav>
  </div>

  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center py-2">
    <div>
      <h1 class="h4">Edit Blog Post</h1>
    </div>

  </div>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
      <div class="col-12 mb-4">
        <div class="card border-0 shadow components-section">
          <div class="card-body">
            <div class="row mb-4">
              <!-- Title -->
              <div class="col-lg-6 col-sm-12 mb-4">
                <label for="{{ form.title.id_for_label }}">Title&nbsp;<span style="color: red;">*</span></label>
                {{ form.title }}
              </div>
              <!-- Author -->
              <div class="col-lg-6 col-sm-6 mb-4">
                <label for="{{ form.image.id_for_label }}">Image&nbsp;<span style="color: red;">*</span></label>
                {{ form.image }}
              </div>
              <!-- Content -->
              <div class="col-lg-12 col-sm-12 mb-4">
                <label for="{{ form.content.id_for_label }}">Content&nbsp;<span style="color: red;">*</span></label>
                {{ form.content }}
              </div>


              <div class="col-lg-6 col-sm-6 mb-4">
                <label for="meta_title" class="form-label">Meta Title:&nbsp;<span style="color: red;">*</span></label>
                {{ form.meta_title }}
              </div>
              <div class="col-lg-6 col-sm-6 mb-4">
                <label for="meta_description" class="form-label">Meta Description:&nbsp;<span style="color: red;">*</span></label>
                {{ form.meta_description }}
              </div>
            </div>
            
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-primary">Edit Blog</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const statusField = document.getElementById('id_status')
      const publishedAtField = document.getElementById('published-at-field')
    
      function togglePublishedAtField() {
        if (statusField.value === 'scheduled') {
          publishedAtField.style.display = 'block'
        } else {
          publishedAtField.style.display = 'none'
        }
      }
    
      statusField.addEventListener('change', togglePublishedAtField)
      togglePublishedAtField() // Initial call on page load
    })
  </script>


  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const tagSelect = document.getElementById('tags')
      if (tagSelect) {
        new Choices(tagSelect, {
          removeItemButton: true,
          searchEnabled: true,
          shouldSort: false,
          placeholder: true,
          placeholderValue: 'Select tags...'
        })
      }
    })
  </script>

  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
{% endblock %}
